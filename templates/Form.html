<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval Prediction</title>
    <style>
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background-color: #f9f9f9;
        }

        label {
            font-size: 14px;
            margin-bottom: 8px;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
        }

        .btn:hover {
            background-color: #45a049;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Loan Approval Prediction</h2>
        <form id="loanForm" action="/predict" method="POST">
            <label for="dependents">No. of dependents:</label>
            <input type="number" id="dependents" name="dependents" required>

            <label for="education">Education:</label>
            <select id="education" name="education">
                <option value="graduate">Graduate</option>
                <option value="non-graduate">Non-Graduate</option>
            </select>

            <label for="employment">Employment Status:</label>
            <select id="employment" name="employment">
                <option value="self-employed">Self-employed</option>
                <option value="employed">Employed</option>
            </select>

            <label for="income">Applicant's Income:</label>
            <input type="number" id="income" name="income" required>

            <label for="loanAmount">Loan Amount:</label>
            <input type="number" id="loanAmount" name="loanAmount" required>

            <label for="loanTerm">Loan Term (in years):</label>
            <input type="number" id="loanTerm" name="loanTerm" required>

            <label for="creditScore">Credit Score:</label>
            <input type="number" id="creditScore" name="creditScore" required>

            <label for="residentialAssets">Residential Assets Value:</label>
            <input type="number" id="residentialAssets" name="residentialAssets" required>

            <label for="bankAssets">Bank Assets Value:</label>
            <input type="number" id="bankAssets" name="bankAssets" required>

            <button type="submit" id="submitButton" class="btn">Predict Loan Approval</button>
        </form>

        <div class="result" id="result">{{ pred }}</div>
    
      <!--  Scripts-->
    


</body>
</html>
